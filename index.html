<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>El Misterio de la Mansión Valdez</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        body {
            background: #05050a;
            font-family: 'Courier New', Courier, monospace;
            color: #f0e6d2;
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
            touch-action: manipulation;
        }
        #game-container {
            position: relative; width: 100vw; height: 100dvh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        canvas {
            image-rendering: pixelated;
            background: #000;
            max-width: 95vw; max-height: 60dvh;
            aspect-ratio: 4 / 3;
            border: 4px solid #3a2a1a;
            outline: 2px solid #d4af37;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            z-index: 1;
        }
        #hud {
            position: absolute; top: 10px; left: 0; right: 0;
            padding: 0 15px; display: flex; justify-content: space-between;
            pointer-events: none; z-index: 10;
        }
        .hud-item {
            background: rgba(10, 10, 20, 0.9);
            padding: 6px 12px; border: 1px solid #d4af37;
            border-radius: 2px; font-size: 11px; color: #d4af37;
            box-shadow: 2px 2px 0 #000;
        }
        #touch-controls {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 20; pointer-events: none;
        }
        #dpad { display: grid; grid-template-areas: ". u ." "l . r" ". d ."; gap: 8px; pointer-events: auto; }
        .dpad-btn {
            width: 50px; height: 50px; background: #2a1a0a;
            border: 2px solid #d4af37; color: #d4af37; font-size: 20px;
            border-radius: 4px; display: flex; justify-content: center; align-items: center;
        }
        .dpad-btn:active { background: #4a3a1a; transform: scale(0.9); }
        .dpad-u { grid-area: u; } .dpad-d { grid-area: d; } .dpad-l { grid-area: l; } .dpad-r { grid-area: r; }
        #action-btn {
            width: 70px; height: 70px; background: #600;
            border: 3px solid #d4af37; color: #fff; border-radius: 50%;
            font-weight: bold; pointer-events: auto; box-shadow: 0 4px 0 #300;
        }
        #action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        .overlay {
            position: absolute; inset: 0; background: rgba(5, 5, 10, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 20px; text-align: center; border: 4px double #d4af37; margin: 10px;
        }
        .overlay h1 { color: #d4af37; font-size: 22px; margin-bottom: 15px; text-shadow: 2px 2px 0 #000; }
        .story { font-size: 13px; line-height: 1.4; margin-bottom: 20px; max-width: 400px; color: #c0c0c0; }
        button.menu-btn {
            background: #3a2a1a; color: #d4af37; border: 2px solid #d4af37;
            padding: 10px 20px; font-family: inherit; font-weight: bold; cursor: pointer;
        }
        #dialog-box {
            position: absolute; bottom: 160px; left: 15px; right: 15px;
            background: #0a0a14; border: 2px solid #d4af37; padding: 12px;
            z-index: 50; max-width: 500px; margin: 0 auto; box-shadow: 0 5px 15px #000;
        }
        #dialog-text { font-size: 13px; line-height: 1.4; }
        .hidden { display: none !important; }
        #puzzle-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; justify-content: center; align-items: center; z-index: 150;
        }
        .puzzle-box { background: #1a0f0a; border: 3px solid #d4af37; padding: 20px; text-align: center; }
        .puzzle-input { 
            width: 120px; background: #000; border: 1px solid #d4af37; 
            color: #d4af37; font-size: 24px; text-align: center; margin: 10px; padding: 5px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div id="location" class="hud-item">📍 Cargando...</div>
            <div id="inventory" class="hud-item">🎒 Vacío</div>
        </div>

        <canvas id="game" width="640" height="480"></canvas>

        <div id="touch-controls" class="hidden">
            <div id="dpad">
                <button class="dpad-btn dpad-u" data-dir="up">▲</button>
                <button class="dpad-btn dpad-l" data-dir="left">◀</button>
                <button class="dpad-btn dpad-r" data-dir="right">▶</button>
                <button class="dpad-btn dpad-d" data-dir="down">▼</button>
            </div>
            <button id="action-btn">ACC</button>
        </div>

        <div id="dialog-box" class="hidden">
            <p id="dialog-text"></p>
            <p style="font-size:9px; color:#d4af37; text-align:right; margin-top:5px;">[Toca para continuar]</p>
        </div>

        <div id="start-screen" class="overlay">
            <h1>EL MISTERIO DE VALDEZ</h1>
            <p class="story">
                La joya "Lágrima de Sangre" ha sido robada. <br><br>
                Busca pistas ocultas en las sombras y descifra el código final.
            </p>
            <button id="start-btn" class="menu-btn">INICIAR INVESTIGACIÓN</button>
            <button id="audio-toggle" class="menu-btn" style="margin-top:10px; font-size:10px;">🔊 SONIDO: ACTIVADO</button>
        </div>

        <div id="end-screen" class="overlay hidden">
            <h1>CASO CERRADO</h1>
            <p id="end-text" class="story"></p>
            <button class="menu-btn" onclick="location.reload()">NUEVO CASO</button>
        </div>

        <div id="puzzle-overlay" class="hidden">
            <div class="puzzle-box">
                <h2 id="p-title" style="color:#d4af37; font-size:16px;"></h2>
                <p id="p-desc" style="font-size:12px; margin:10px 0;"></p>
                <input type="text" id="p-input" class="puzzle-input" maxlength="6">
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button id="p-check" class="menu-btn">CONFIRMAR</button>
                    <button id="p-cancel" class="menu-btn" style="background:#222;">CERRAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SISTEMA DE AUDIO REPARADO ---
        let audioCtx = null;
        let masterGain = null;
        let isMuted = false;
        let audioInitialized = false;

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.1;
                masterGain.connect(audioCtx.destination);
            }

            // Forzar activación del contexto tras interacción del usuario
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            if (!audioInitialized) {
                // Sonido ambiente de fondo
                setInterval(() => {
                    if(game.state === 'playing' && !isMuted) playNote(110 + Math.random() * 10, 1.5, 'triangle', 0.05);
                }, 2000);
                
                setInterval(() => {
                    if(game.state === 'playing' && !isMuted && Math.random() > 0.8) playNote(440 + Math.random() * 100, 0.1, 'sine', 0.02);
                }, 500);
                
                audioInitialized = true;
            }
        }

        function playNote(freq, dur, type = 'sine', vol = 0.2) {
            if (!audioCtx || isMuted || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g);
            g.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        // Efecto especial para la joya (Lágrima de Sangre)
        function playVictorySound() {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((f, i) => {
                setTimeout(() => playNote(f, 0.6, 'sine', 0.3), i * 150);
            });
        }

        // --- LÓGICA DE JUEGO ORIGINAL CON NUEVO ACERTIJO ---
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const audioToggle = document.getElementById('audio-toggle');
        const actionBtn = document.getElementById('action-btn');
        
        const game = {
            state: 'menu',
            currentRoom: 'entrada',
            inventory: [],
            flags: { nota: false, llave: false, pistaReloj: false, pistaCuadro: false, pistaLibro: false }
        };

        const player = { x: 320, y: 400, w: 20, h: 30, speed: 2.5, dir: 'up' };
        const keys = { up: false, down: false, left: false, right: false };

        const rooms = {
            entrada: {
                name: 'Vestíbulo Oscuro', floor: '#1a1a1a', wall: '#0a0a0a',
                objects: [
                    { id: 'armadura', x: 80, y: 110, w: 40, h: 60, label: 'Armadura Antigua', action: 'lookArmor' },
                    { id: 'chimenea', x: 260, y: 70, w: 120, h: 80, label: 'Chimenea Apagada', action: 'lookFire' },
                    { id: 'alfombra', x: 240, y: 300, w: 160, h: 100, label: 'Alfombra Manchada', action: 'checkRug' },
                    { id: 'puertaBib', x: 580, y: 180, w: 40, h: 100, label: 'Puerta de Roble', action: 'enterBib' }
                ],
                start: { x: 320, y: 420 }
            },
            biblioteca: {
                name: 'Biblioteca del Silencio', floor: '#221108', wall: '#110804',
                objects: [
                    { id: 'estante1', x: 60, y: 100, w: 100, h: 40, label: 'Sección de Historia', action: 'readHist' },
                    { id: 'reloj', x: 300, y: 80, w: 40, h: 80, label: 'Reloj de Pie', action: 'lookClock' },
                    { id: 'escritorio', x: 450, y: 300, w: 100, h: 60, label: 'Escritorio Cerrado', action: 'checkDesk' },
                    { id: 'puertaEnt', x: 20, y: 180, w: 40, h: 100, label: 'Volver al Vestíbulo', action: 'enterEnt' },
                    { id: 'puertaEst', x: 580, y: 180, w: 40, h: 100, label: 'Hacia el Estudio', action: 'enterEst' }
                ],
                start: { x: 80, y: 230 }
            },
            estudio: {
                name: 'Sanctum de Valdez', floor: '#1a0d00', wall: '#050200',
                objects: [
                    { id: 'cuadro', x: 240, y: 80, w: 160, h: 100, label: 'Retrato Familiar', action: 'lookPortrait' },
                    { id: 'cajafuerte', x: 500, y: 120, w: 60, h: 60, label: 'Caja Fuerte Imperial', action: 'solveSafe' },
                    { id: 'puertaBib2', x: 20, y: 180, w: 40, h: 100, label: 'Regresar', action: 'enterBibFromEst' }
                ],
                start: { x: 80, y: 230 }
            }
        };

        function draw() {
            const room = rooms[game.currentRoom];
            
            // Suelo
            ctx.fillStyle = room.floor;
            ctx.fillRect(0, 0, 640, 480);
            
            // Paredes
            ctx.fillStyle = room.wall;
            ctx.fillRect(0, 0, 640, 120); // Pared superior
            ctx.fillRect(0, 0, 40, 480);   // Izquierda
            ctx.fillRect(600, 0, 40, 480); // Derecha

            // Dibujar objetos con tus estilos originales
            room.objects.forEach(o => {
                ctx.fillStyle = '#3a2a1a';
                if(o.id === 'chimenea') ctx.fillStyle = '#222';
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeStyle = '#d4af37';
                ctx.strokeRect(o.x, o.y, o.w, o.h);

                // Etiquetas de proximidad
                const dist = Math.hypot(player.x - (o.x + o.w/2), player.y - (o.y + o.h/2));
                if(dist < 60 && game.state === 'playing') {
                    ctx.fillStyle = '#d4af37';
                    ctx.font = '12px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText(o.label, o.x + o.w/2, o.y - 10);
                }
            });

            // Dibujar Personaje (Tu diseño original)
            ctx.fillStyle = '#f4c99a'; // Piel
            ctx.fillRect(player.x - 10, player.y - 30, 20, 10);
            ctx.fillStyle = '#223'; // Ropa
            ctx.fillRect(player.x - 12, player.y - 20, 24, 20);
            ctx.fillStyle = '#000'; // Pelo
            ctx.fillRect(player.x - 15, player.y - 32, 30, 4);

            // Efecto de iluminación (Tu gradiente original)
            const grad = ctx.createRadialGradient(player.x, player.y - 15, 20, player.x, player.y - 15, 180);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.95)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 640, 480);
        }

        function update() {
            if(game.state !== 'playing') return;
            let moveX = 0, moveY = 0;
            if(keys.up) moveY = -player.speed;
            if(keys.down) moveY = player.speed;
            if(keys.left) moveX = -player.speed;
            if(keys.right) moveX = player.speed;

            // Colisiones básicas con bordes
            const nextX = player.x + moveX;
            const nextY = player.y + moveY;
            if(nextX > 55 && nextX < 585) player.x = nextX;
            if(nextY > 130 && nextY < 460) player.y = nextY;
        }

        function handleAction() {
            if(game.state === 'dialog') { closeDialog(); return; }
            if(game.state !== 'playing') return;

            const room = rooms[game.currentRoom];
            const obj = room.objects.find(o => Math.hypot(player.x - (o.x + o.w/2), player.y - (o.y + o.h/2)) < 60);
            if(!obj) return;
            
            playNote(220, 0.05);

            switch(obj.action) {
                case 'lookArmor': 
                    showDialog(["Una armadura del siglo XVII.", "Inscripción en el casco: 'El primer dígito es la cantidad de libros prohibidos (rojos)'."]); 
                    break;
                case 'lookFire': 
                    showDialog(["Cenizas frías.", "Hay un trozo de papel quemado que dice: '...la alfombra oculta algo...'"]); 
                    game.flags.nota = true; 
                    break;
                case 'checkRug': 
                    if(game.flags.nota && !game.flags.llave) {
                        showDialog(["¡Has encontrado la LLAVE DE BRONCE debajo de la alfombra!"]);
                        game.inventory.push("Llave de Bronce");
                        game.flags.llave = true;
                        updateHUD();
                        playNote(880, 0.2);
                    } else showDialog(["Una alfombra polvorienta. No parece haber nada más."]);
                    break;
                case 'enterBib': 
                    if(game.flags.llave) { game.currentRoom = 'biblioteca'; player.x = 80; updateHUD(); } 
                    else showDialog(["La puerta está cerrada con llave."]);
                    break;
                case 'readHist': 
                    showDialog(["Cuentas exactamente 7 libros rojos en la estantería.", "Nota: 'Dígito 1 = 7'."]); 
                    game.flags.pistaLibro = true; 
                    break;
                case 'lookClock': 
                    showDialog(["El reloj de péndulo está parado en las 09:00.", "¿Qué número está exactamente OPUESTO al 9 en la esfera del reloj?", "Eso te dará el segundo dígito."]); 
                    game.flags.pistaReloj = true; 
                    break;
                case 'checkDesk': 
                    showDialog(["En el escritorio hay un dibujo de un sol.", "Debajo dice: 'El tercer dígito es el número de la suerte de Valdez (ver su retrato)'."]); 
                    break;
                case 'enterEnt': game.currentRoom = 'entrada'; player.x = 550; updateHUD(); break;
                case 'enterEst': 
                    if(game.flags.pistaReloj && game.flags.pistaLibro) { game.currentRoom = 'estudio'; player.x = 80; updateHUD(); } 
                    else showDialog(["Necesitas investigar más en la biblioteca para entender el mecanismo."]);
                    break;
                case 'lookPortrait': 
                    showDialog(["El retrato del Sr. Valdez.", "Lleva un anillo con el número 5 grabado."]); 
                    game.flags.pistaCuadro = true; 
                    break;
                case 'solveSafe': 
                    // Explicación: Libros (7) | Opuesto al 9 (3) | Anillo (5) -> 735
                    openPuzzle("CAJA FUERTE", "Ingresa el código de 3 dígitos.", "Pistas: Libros | Reloj Opuesto | Anillo", "735"); 
                    break;
                case 'enterBibFromEst': game.currentRoom = 'biblioteca'; player.x = 550; updateHUD(); break;
            }
        }

        // --- FUNCIONES DE UI ---
        function showDialog(lines) {
            game.state = 'dialog';
            document.getElementById('dialog-box').classList.remove('hidden');
            document.getElementById('dialog-text').textContent = lines.join(' ');
        }
        function closeDialog() { game.state = 'playing'; document.getElementById('dialog-box').classList.add('hidden'); }
        function updateHUD() {
            document.getElementById('location').textContent = '📍 ' + rooms[game.currentRoom].name;
            document.getElementById('inventory').textContent = '🎒 ' + (game.inventory.length ? game.inventory.join(', ') : 'Vacío');
        }

        function openPuzzle(title, desc, hint, ans) {
            game.state = 'puzzle';
            currentAnswer = ans;
            document.getElementById('puzzle-overlay').classList.remove('hidden');
            document.getElementById('p-title').textContent = title;
            document.getElementById('p-desc').textContent = desc + " (" + hint + ")";
            document.getElementById('p-input').value = "";
            document.getElementById('p-input').focus();
        }

        let currentAnswer = "";
        document.getElementById('p-check').onclick = () => {
            if(document.getElementById('p-input').value === currentAnswer) {
                document.getElementById('puzzle-overlay').classList.add('hidden');
                game.state = 'end';
                playVictorySound();
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('end-text').innerHTML = "¡Caja fuerte abierta! <br><br> Recuperas la joya Lágrima de Sangre. Has resuelto el misterio de la Mansión Valdez. <br><br> ¡Excelente trabajo!";
            } else {
                playNote(100, 0.4, 'square');
                document.getElementById('p-input').style.borderColor = 'red';
                setTimeout(()=> document.getElementById('p-input').style.borderColor = '#d4af37', 500);
            }
        };
        document.getElementById('p-cancel').onclick = () => { document.getElementById('puzzle-overlay').classList.add('hidden'); game.state = 'playing'; };

        // --- LISTENERS ---
        startBtn.onclick = async () => {
            await initAudio();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('touch-controls').classList.remove('hidden');
            game.state = 'playing';
            updateHUD();
        };

        audioToggle.onclick = async () => {
            if(!audioCtx) await initAudio();
            isMuted = !isMuted;
            audioToggle.textContent = isMuted ? '🔇 SONIDO: DESACTIVADO' : '🔊 SONIDO: ACTIVADO';
        };

        window.onkeydown = e => {
            if(e.key.includes('Arrow')) keys[e.key.replace('Arrow','').toLowerCase()] = true;
            if(e.key === 'w') keys.up = true; if(e.key === 's') keys.down = true;
            if(e.key === 'a') keys.left = true; if(e.key === 'd') keys.right = true;
            if(e.key === 'e' || e.key === ' ') handleAction();
        };
        window.onkeyup = e => {
            if(e.key.includes('Arrow')) keys[e.key.replace('Arrow','').toLowerCase()] = false;
            if(e.key === 'w') keys.up = false; if(e.key === 's') keys.down = false;
            if(e.key === 'a') keys.left = false; if(e.key === 'd') keys.right = false;
        };

        document.querySelectorAll('.dpad-btn').forEach(b => {
            b.onpointerdown = e => { e.preventDefault(); keys[b.dataset.dir] = true; };
            b.onpointerup = e => { e.preventDefault(); keys[b.dataset.dir] = false; };
            b.onpointerleave = e => { keys[b.dataset.dir] = false; };
        });
        actionBtn.onpointerdown = e => { e.preventDefault(); handleAction(); };

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
